services:
  - type: web
    name: acai-lunar-s-plus
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
